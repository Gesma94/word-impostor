name: Client - Build 🏗️

on:
  push:
    branches: [ "main" ]
    paths: [ "client/**", "common/**", ".github/workflows/client-cd.yml" ]

jobs:      
  DeployOnNetlify:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./client

    steps:
    - name: Checkout
      uses: actions/checkout@v3
    
    - name: Echo1
      run: echo "vars.VITE_SERVER_BASE_URL is ${{ vars.VITE_SERVER_BASE_URL }}"

    - name: Setup Node.js v20.x
      uses: actions/setup-node@v3
      with:
        node-version: 20.x

    - name: NPM Install
      run: npm install
    
    - name: NPM Build
      run: npm run build
      env:
        VITE_SERVER_BASE_URL: ${{ vars.VITE_SERVER_BASE_URL }}
        VITE_SERVER_BASE_WS_URL: ${{ vars.VITE_SERVER_BASE_WS_URL }}
  
    - name: Deploy To Netlify
      uses: South-Paw/action-netlify-deploy@v1.2.0
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        netlify-auth-token: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        netlify-site-id: ${{ secrets.NETLIFY_SITE_ID }}
        build-dir: './client/dist'
